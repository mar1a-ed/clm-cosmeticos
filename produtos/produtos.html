<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
 
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ═══════════════════════════ NAVBAR ═══════════════════════════ -->
    <header class="navbar">
        <div class="iconLogo">
            <a href="../inicio/inicio.html">
                <img src="../imgs/clm_cosmeticos_logo.jpg" alt="iconLogo">
            </a>
        </div>
 
        <!-- Botão hambúrguer: só aparece em telas pequenas (controlado via CSS) -->
        <button type="button" class="menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="menubar">
            <i class="bi bi-list"></i>
        </button>
 
        <div class="menubar" id="menubar">
 
            <a href="../produtos/produtos.html">Produtos</a>
            <a href="">Acessórios</a>
            <a href="">Kits</a>
            <a href="../contato/contato.html">Contato</a>
        </div>
 
        <div class="iconsPerfil">
            <a href=""><img src="../imgs/coracao.png"></a>
            <a href=""><img src="../imgs/Sample_User_Icon.png"></a>
            <a href=""><img src="../imgs/5087784.png"></a>
        </div>
    </header>
<!-- ═══════════════════════════ HERO ═══════════════════════════ -->
<section class="hero-section">
  <div class="container">
    <p class="hero-eyebrow">Coleção 2025</p>
    <h1 class="hero-title">Beleza que<br>transforma</h1>
    <p class="hero-sub">Cosméticos selecionados para realçar o que há de mais belo em você, com ingredientes naturais e fórmulas exclusivas.</p>
 
    <div class="container">
    <div class="search-wrapper">
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Pesquise produtos, marcas…"
        autocomplete="off"
      />
      <i class="bi bi-search search-icon"></i>
    </div>
  </div>
  </div>
</section>
 
<!-- ═══════════════════════════ FILTER BAR ═══════════════════════════ -->
 <div class="filter-bar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div class="filter-pills" id="filterPills">
         
          <button type="button" class="btn btn-pill active" data-categoria="TODOS">
            Todos
          </button>
 
          <!-- Categorias do enum Categoria.java -->
          <button type="button" class="btn btn-pill" data-categoria="MAQUIAGEM">
            Maquiagem
          </button>
          <button type="button" class="btn btn-pill" data-categoria="CUIDADOS_COM_A_PELE">
            Cuidados com a Pele
          </button>
          <button type="button" class="btn btn-pill" data-categoria="PERFUMARIA">
            Perfumaria
          </button>
          <button type="button" class="btn btn-pill" data-categoria="PROTETOR_SOLAR">
            Protetor Solar
          </button>
          <button type="button" class="btn btn-pill" data-categoria="ESMALTERIA">
            Esmalteria
          </button>
          <button type="button" class="btn btn-pill" data-categoria="TRATAMENTO_FACIAL">
            Tratamento Facial
          </button>
          <button type="button" class="btn btn-pill" data-categoria="CORPO_E_BANHO">
            Corpo e Banho
          </button>
          <button type="button" class="btn btn-pill" data-categoria="ACESSORIOS_DE_BELEZA">
            Acessórios de Beleza
          </button>
          <button type="button" class="btn btn-pill" data-categoria="KITS_E_PRESENTES">
            Kits e Presentes
          </button>
          <button type="button" class="btn btn-pill" data-categoria="PRODUTOS_NATURAIS">
            Produtos Naturais
          </button>
        </div>
      </div>
    </div>
  </div>
 
<!-- ═══════════════════════════ PRODUTOS ═══════════════════════════ -->

<main>
    <!-- Mensagem de status (carregando, erro, etc) -->
    <p id="status-msg">Carregando produtos...</p>
 
    <!-- Aqui os produtos serão inseridos dinamicamente pelo JavaScript -->
    <div id="lista-produtos" class="grid-produtos"></div>
  </main>
 
  <!-- Importa o arquivo de JS que faz a requisição e monta a página -->
  <script src="script.js"></script>
 
<!-- ═══════════════════════════ FOOTER ═══════════════════════════ -->
<footer>
  © 2025 <strong>CLM Cosméticos</strong> · Todos os direitos reservados
</footer>
 
<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toastEl" class="toast toast-lumiere align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">Item adicionado!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
 
<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 

</body>
</html>
